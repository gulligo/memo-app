<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 메모장</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.png" type="image/png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
:root{--bg:#f5f5f7;--card:#fff;--border:#e5e5ea;--primary:#007aff;--text:#1c1c1e;--muted:#8e8e93;--red:#ff3b30;--green:#34c759;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:18px;font-weight:700;}
.icon-btn{border:none;background:none;font-size:22px;color:var(--primary);padding:4px;cursor:pointer;}
.main-view{padding:12px;}
.group-item{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.group-name{font-size:16px;font-weight:700;}
.group-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.group-arrow.open{transform:rotate(90deg);}
.group-children{display:none;border-top:1px solid var(--border);}
.group-children.open{display:block;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 12px 28px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.sub-item:last-child{border-bottom:none;}
.sub-name{font-size:15px;}
.sub-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.sub-arrow{font-size:16px;color:var(--muted);}
.memo-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column;}
.memo-view.show{display:flex;}
.memo-header{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.back-btn{border:none;background:none;font-size:36px;color:var(--primary);padding:0 8px 0 0;cursor:pointer;line-height:1;}
.save-btn{border:none;background:var(--primary);color:#fff;border-radius:8px;padding:7px 16px;font-size:15px;font-weight:700;cursor:pointer;}
.memo-body{flex:1;overflow-y:auto;padding:12px;padding-top:20px;-webkit-overflow-scrolling:touch;}
.toolbar{background:#fff;border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.tool-btn{border:none;background:var(--bg);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.block{margin-bottom:8px;position:relative;}
.text-view{border-radius:10px;padding:10px 12px;font-size:15px;color:var(--text);min-height:44px;white-space:pre-wrap;word-break:break-word;user-select:none;}
.text-view.empty{color:var(--muted);}
.text-edit{display:none;width:100%;min-height:44px;border:2px solid var(--primary);background:var(--card);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--text);outline:none;resize:none;font-family:inherit;}
.text-edit.show{display:block;}
.text-done-btn{display:none;position:absolute;top:4px;right:4px;background:var(--green);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;z-index:30;}
.text-done-btn.show{display:block;}
.text-del-btn{display:none;position:absolute;top:4px;right:50px;background:var(--red);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;z-index:30;}
.text-del-btn.show{display:block;}
.checklist-block{background:var(--card);border-radius:10px;padding:8px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.check-item:last-child{border-bottom:none;}
.check-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--primary);flex-shrink:0;}
.check-item-text{flex:1;border:none;background:none;font-size:15px;color:var(--text);outline:none;font-family:inherit;}
.check-item-text.done{text-decoration:line-through;color:var(--muted);}
.add-check-btn{display:flex;align-items:center;gap:6px;color:var(--primary);font-size:14px;border:none;background:none;padding:8px 0;cursor:pointer;width:100%;}
.block-del{display:none;position:absolute;top:6px;right:6px;background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.block-handle{display:none;position:absolute;top:8px;left:8px;background:rgba(0,0,0,.2);color:#fff;border:none;border-radius:6px;width:22px;height:22px;font-size:11px;align-items:center;justify-content:center;cursor:grab;z-index:20;touch-action:none;}
.photo-item{position:relative;margin-bottom:6px;border-radius:8px;}
.photo-item img{width:100%;display:block;border-radius:8px;transform-origin:center center;}
.photo-done-btn{display:none;position:absolute;bottom:8px;left:8px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;z-index:5;}
.photo-item.editing .photo-done-btn{display:block;}
.photo-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;align-items:center;justify-content:center;cursor:pointer;z-index:5;display:none;}
.photo-item.editing .photo-del{display:flex;}
.split-block{display:flex;gap:8px;border-radius:10px;padding:8px;margin-bottom:8px;}
.split-photo{flex:1;border-radius:8px;overflow:hidden;}
.split-photo img{width:100%;display:block;border-radius:8px;}
.split-text{flex:1;border:none;background:var(--bg);border-radius:8px;padding:8px;font-size:14px;color:var(--text);outline:none;resize:none;font-family:inherit;min-height:100px;}
.video-block{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:8px;}
.video-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;}
.video-url-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px;}
.video-add-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:400;align-items:flex-end;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;}
.modal-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;outline:none;font-family:inherit;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-btn.confirm{background:var(--primary);color:#fff;}
.modal-btn.cancel{background:var(--bg);color:var(--text);}
.ctx-menu{display:none;position:fixed;background:var(--card);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);overflow:hidden;z-index:500;min-width:160px;}
.ctx-menu.show{display:block;}
.ctx-item{padding:12px 16px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--border);}
.ctx-item:last-child{border-bottom:none;}
.ctx-item.danger{color:var(--red);}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">용용이 메모장</div>
  <button class="icon-btn" onclick="showAddGroupModal()">➕</button>
</div>
<div class="main-view"><div id="groupList"></div></div>
<div class="memo-view" id="memoView">
  <div class="memo-header">
    <button class="back-btn" onclick="closeMemo()">‹</button>
    <button class="save-btn" id="saveBtn" onclick="saveMemo()">저장</button>
  </div>
  <div class="memo-body" id="memoBody"></div>
  <div class="toolbar">
    <button class="tool-btn" onclick="addPhotoTextBlock()">🖼+📝</button>
    <button class="tool-btn" onclick="addTextBlock()">📝 텍스트</button>
    <button class="tool-btn" onclick="addChecklistBlock()">☑️ 체크</button>
    <button class="tool-btn" onclick="addPhotoBlock()">🖼 사진</button>
    <button class="tool-btn" onclick="addVideoBlock()">🎬 동영상</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <input class="modal-input" id="modalInput" placeholder="이름 입력" />
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" id="modalConfirmBtn">확인</button>
    </div>
  </div>
</div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxRename">이름 변경</div>
  <div class="ctx-item" id="ctxAddSub">소그룹 추가</div>
  <div class="ctx-item danger" id="ctxDelete">삭제</div>
</div>
<input type="file" id="photoInput" accept="image/*" multiple style="display:none" />
<script>
const KEY='memo_app_v1';
function loadData(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{groups:[]};}catch(e){return{groups:[]};}}
function saveData(){localStorage.setItem(KEY,JSON.stringify(data));}
let data=loadData();
let currentGroupId=null,currentSubId=null,currentMemo=null;
let ctxTarget=null,ctxType=null,modalCallback=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function render(){
  const list=document.getElementById('groupList');
  list.innerHTML='';
  data.groups.forEach(g=>{
    const item=document.createElement('div');item.className='group-item';
    const header=document.createElement('div');header.className='group-header';
    header.innerHTML=`<div class="group-name">${g.name}</div><span class="group-arrow ${g.open?'open':''}">▶</span>`;
    header.addEventListener('click',()=>toggleGroup(g.id));
    header.addEventListener('contextmenu',e=>showCtx(e,'group',g.id));
    const children=document.createElement('div');
    children.className='group-children'+(g.open?' open':'');
    (g.subs||[]).forEach(s=>{
      const si=document.createElement('div');si.className='sub-item';
      si.innerHTML=`<div><div class="sub-name">${s.name}</div><div class="sub-meta">${getSubMeta(s)}</div></div><span class="sub-arrow">›</span>`;
      si.addEventListener('click',()=>openMemo(g.id,s.id));
      si.addEventListener('contextmenu',e=>showCtx(e,'sub',s.id,g.id));
      children.appendChild(si);
    });
    const addSub=document.createElement('div');addSub.className='sub-item';
    addSub.style.cssText='color:var(--primary);justify-content:center;';
    addSub.textContent='+ 소그룹 추가';
    addSub.addEventListener('click',()=>showAddSubModal(g.id));
    children.appendChild(addSub);
    item.appendChild(header);item.appendChild(children);list.appendChild(item);
  });
}

function getSubMeta(s){
  if(!s.blocks||!s.blocks.length)return '비어있음';
  const parts=[];
  if(s.blocks.filter(b=>b.type==='text'&&b.content).length)parts.push('텍스트');
  if(s.blocks.filter(b=>b.type==='checklist').length)parts.push('체크');
  if(s.blocks.filter(b=>b.type==='photo').length)parts.push('사진');
  if(s.blocks.filter(b=>b.type==='video'&&b.url).length)parts.push('동영상');
  return parts.join(' · ')||'비어있음';
}

function toggleGroup(gid){const g=data.groups.find(x=>x.id===gid);if(g){g.open=!g.open;saveData();render();}}

function openMemo(gid,sid){
  currentGroupId=gid;currentSubId=sid;
  const g=data.groups.find(x=>x.id===gid);
  const s=g.subs.find(x=>x.id===sid);
  currentMemo=JSON.parse(JSON.stringify(s));
  renderMemoBody();
  document.getElementById('memoView').classList.add('show');
}

function closeMemo(){
  document.getElementById('memoView').classList.remove('show');
  currentMemo=null;
}

function saveMemo(){
  if(!currentMemo)return;
  collectMemoBlocks();
  const g=data.groups.find(x=>x.id===currentGroupId);
  const idx=g.subs.findIndex(x=>x.id===currentSubId);
  document.querySelectorAll('.photo-item.editing').forEach(el=>el.classList.remove('editing'));
  g.subs[idx]=JSON.parse(JSON.stringify(currentMemo));
  saveData();render();
  const btn=document.getElementById('saveBtn');
  btn.textContent='✓';btn.style.background='var(--green)';
  setTimeout(()=>{btn.textContent='저장';btn.style.background='var(--primary)';},1200);
}

function collectMemoBlocks(){
  const nb=[];
  document.getElementById('memoBody').querySelectorAll('.block').forEach(b=>{
    const block=currentMemo.blocks.find(x=>x.id===b.dataset.bid);
    if(!block)return;
    if(block.type==='text'){
      const edit=b.querySelector('.text-edit');
      if(edit)block.content=edit.value;
    }else if(block.type==='checklist'){
      block.items=[];
      b.querySelectorAll('.check-item').forEach(ci=>{
        block.items.push({text:ci.querySelector('.check-item-text').value,done:ci.querySelector('input').checked});
      });
    }
    nb.push(block);
  });
  currentMemo.blocks=nb;
}

function renderMemoBody(){
  const body=document.getElementById('memoBody');
  body.innerHTML='';
  (currentMemo.blocks||[]).forEach(b=>body.appendChild(createBlockEl(b)));
}

function createBlockEl(block){
  const wrap=document.createElement('div');wrap.className='block';wrap.dataset.bid=block.id;
  const handle=document.createElement('button');handle.className='block-handle';handle.textContent='☰';
  
  let dragStartY=0;
  handle.addEventListener('touchstart',e=>{
    e.preventDefault();
    dragStartY=e.touches[0].clientY;
    wrap.style.opacity='0.6';
  },{passive:false});
  handle.addEventListener('touchmove',e=>{
    e.preventDefault();
    const body=document.getElementById('memoBody');
    const blocks=Array.from(body.querySelectorAll('.block'));
    const y=e.touches[0].clientY;
    const target=blocks.find(b=>{
      if(b===wrap)return false;
      const r=b.getBoundingClientRect();
      return y>=r.top&&y<=r.bottom;
    });
    if(target){
      const idx=blocks.indexOf(wrap);
      const tidx=blocks.indexOf(target);
      if(tidx<idx)body.insertBefore(wrap,target);
      else body.insertBefore(wrap,target.nextSibling);
    }
  },{passive:false});
  handle.addEventListener('touchend',()=>{
    wrap.style.opacity='1';
    collectMemoBlocks();
    renderMemoBody();
  });
  
  wrap.appendChild(handle);
  wrap.addEventListener('click',()=>{
    document.querySelectorAll('.block-del,.block-handle').forEach(b=>b.style.display='none');
    const d=wrap.querySelector('.block-del');
    const h=wrap.querySelector('.block-handle');
    if(d)d.style.display='flex';
    if(h)h.style.display='flex';
  });

  if(block.type==='text'){
    const view=document.createElement('div');
    view.className='text-view'+(block.content?'':' empty');
    view.textContent=block.content||'길게 눌러서 편집';
    const edit=document.createElement('textarea');edit.className='text-edit';
    edit.value=block.content||'';edit.placeholder='내용 입력...';
    edit.addEventListener('input',()=>{edit.style.height='auto';edit.style.height=edit.scrollHeight+'px';});
    const doneBtn=document.createElement('button');doneBtn.className='text-done-btn';doneBtn.textContent='완료';
    const delBtn=document.createElement('button');delBtn.className='text-del-btn';delBtn.textContent='삭제';
    let pressTimer=null;
    view.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>{
      view.style.display='none';
      edit.classList.add('show');
      doneBtn.classList.add('show');
      delBtn.classList.add('show');
      edit.style.height='auto';edit.style.height=edit.scrollHeight+'px';
      edit.focus();
    },600);},{passive:true});
    view.addEventListener('touchend',()=>clearTimeout(pressTimer));
    view.addEventListener('touchmove',()=>clearTimeout(pressTimer));
    doneBtn.addEventListener('click',()=>{
      block.content=edit.value;
      view.textContent=edit.value||'길게 눌러서 편집';
      view.className='text-view'+(edit.value?'':' empty');
      view.style.display='';
      edit.classList.remove('show');
      doneBtn.classList.remove('show');
      delBtn.classList.remove('show');
    });
    delBtn.addEventListener('click',()=>{
      currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id);
      renderMemoBody();
    });
    wrap.appendChild(view);wrap.appendChild(edit);wrap.appendChild(doneBtn);wrap.appendChild(delBtn);
  }else if(block.type==='checklist'){
    const cl=document.createElement('div');cl.className='checklist-block';
    (block.items||[]).forEach(item=>cl.appendChild(createCheckItem(item)));
    const addBtn=document.createElement('button');addBtn.className='add-check-btn';addBtn.textContent='＋ 항목 추가';
    addBtn.addEventListener('click',()=>{
      collectMemoBlocks();
      currentMemo.blocks.find(x=>x.id===block.id).items.push({text:'',done:false});
      renderMemoBody();
    });
    cl.appendChild(addBtn);wrap.appendChild(cl);
    const del=document.createElement('button');del.className='block-del';del.textContent='✕';
    del.addEventListener('click',()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id);renderMemoBody();});
    wrap.appendChild(del);
  }else if(block.type==='photo'){
    const pb=document.createElement('div');pb.className='photo-block';
    (block.photos||[]).forEach((p,i)=>{
      if(!block.transforms)block.transforms=[];
      if(!block.transforms[i])block.transforms[i]={r:0,s:1,x:0,y:0};
      const t=block.transforms[i];
      const pi=document.createElement('div');pi.className='photo-item';
      const img=document.createElement('img');img.src=p;
      img.style.transform=`rotate(${t.r}deg)`;img.style.width=`${Math.round(t.s*100)}%`;img.style.marginLeft=`${t.x}px`;img.style.marginTop=`${t.y}px`;
      const doneBtn=document.createElement('button');doneBtn.className='photo-done-btn';doneBtn.textContent='완료';
      doneBtn.addEventListener('click',e=>{
        e.stopPropagation();
        pi.classList.remove('editing');
        const b=currentMemo.blocks.find(x=>x.id===block.id);
        if(b){if(!b.transforms)b.transforms=[];b.transforms[i]={r:t.r,s:t.s,x:t.x,y:t.y};}
      });
      const pd=document.createElement('button');pd.className='photo-del';pd.textContent='✕';
      pd.addEventListener('click',e=>{
        e.stopPropagation();
        const b=currentMemo.blocks.find(x=>x.id===block.id);
        b.photos.splice(i,1);if(b.transforms)b.transforms.splice(i,1);
        renderMemoBody();
      });
      let pt=null;
      let p1={dist:0,angle:0,scale:1,rotate:0};
      let dragging=false,lx=0,ly=0,sx=0,sy=0;
      pi.addEventListener('touchstart',e=>{
        if(!pi.classList.contains('editing')){
          pt=setTimeout(()=>pi.classList.add('editing'),600);
          return;
        }
        clearTimeout(pt);
        e.stopPropagation();
        if(e.touches.length===2){
          p1.dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
          p1.angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY,e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI;
          p1.scale=t.s;p1.rotate=t.r;
        }else if(e.touches.length===1){
          dragging=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;sx=t.x;sy=t.y;
        }
      },{passive:true});
      pi.addEventListener('touchmove',e=>{
        if(!pi.classList.contains('editing')){clearTimeout(pt);return;}
        e.preventDefault();
        if(e.touches.length===2){
          const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
          const angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY,e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI;
          t.s=Math.min(3,Math.max(0.3,p1.scale*(dist/p1.dist)));
          t.r=p1.rotate+(angle-p1.angle);
        }else if(dragging&&e.touches.length===1){
          t.x=sx+(e.touches[0].clientX-lx);
          t.y=sy+(e.touches[0].clientY-ly);
        }
        img.style.transform=`rotate(${t.r}deg)`;img.style.width=`${Math.round(t.s*100)}%`;img.style.marginLeft=`${t.x}px`;img.style.marginTop=`${t.y}px`;
      },{passive:false});
      pi.addEventListener('touchend',e=>{clearTimeout(pt);if(e.touches.length===0)dragging=false;});
      pi.appendChild(img);pi.appendChild(doneBtn);pi.appendChild(pd);
      pb.appendChild(pi);
    });
    wrap.appendChild(pb);
    const del=document.createElement('button');del.className='block-del';del.textContent='✕';
    del.addEventListener('click',()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id);renderMemoBody();});
    wrap.appendChild(del);
  }else if(block.type==='split'){
    if(!block.transform)block.transform={r:0,s:1};
    const t=block.transform;
    const sb=document.createElement('div');sb.className='split-block';
    const sp=document.createElement('div');sp.className='split-photo';
    sp.style.cssText='flex:1;border-radius:8px;overflow:hidden;position:relative;';
    const img=document.createElement('img');img.src=block.photo;
    img.style.transform=`rotate(${t.r}deg) scale(${t.s})`;
    img.style.cssText+=';width:100%;display:block;border-radius:8px;transform-origin:center;';
    let pt=null,p1={dist:0,angle:0,scale:1,rotate:0};
    sp.addEventListener('touchstart',e=>{
      pt=setTimeout(()=>sp.classList.add('editing'),600);
      if(e.touches.length===2){
        p1.dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        p1.angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY,e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI;
        p1.scale=t.s;p1.rotate=t.r;
      }
    },{passive:true});
    sp.addEventListener('touchmove',e=>{
      clearTimeout(pt);
      if(e.touches.length===2){
        const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY,e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI;
        t.s=Math.min(3,Math.max(0.3,p1.scale*(dist/p1.dist)));
        t.r=p1.rotate+(angle-p1.angle);
        img.style.transform=`rotate(${t.r}deg) scale(${t.s})`;
        block.transform={r:t.r,s:t.s};
      }
      e.preventDefault();
    },{passive:false});
    sp.addEventListener('touchend',()=>clearTimeout(pt));
    sp.appendChild(img);
    const st=document.createElement('textarea');st.className='split-text';
    st.value=block.text||'';st.placeholder='텍스트 입력...';
    st.addEventListener('input',()=>{block.text=st.value;});
    const del=document.createElement('button');del.className='block-del';del.textContent='✕';
    del.addEventListener('click',()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id);renderMemoBody();});
    sb.appendChild(sp);sb.appendChild(st);
    wrap.appendChild(sb);wrap.appendChild(del);
  }else if(block.type==='video'){
    const vb=document.createElement('div');vb.className='video-block';
    if(block.url){
      const eu=getYoutubeEmbedUrl(block.url);
      if(eu){const f=document.createElement('iframe');f.className='video-frame';f.src=eu;f.allowFullscreen=true;f.allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';vb.appendChild(f);}
    }else{
      const inp=document.createElement('input');inp.className='video-url-input';inp.placeholder='YouTube 링크 붙여넣기';
      const btn=document.createElement('button');btn.className='video-add-btn';btn.textContent='동영상 추가';
      btn.addEventListener('click',()=>{
        collectMemoBlocks();
        currentMemo.blocks.find(x=>x.id===block.id).url=inp.value.trim();
        renderMemoBody();
      });
      vb.appendChild(inp);vb.appendChild(btn);
    }
    wrap.appendChild(vb);
    const del=document.createElement('button');del.className='block-del';del.textContent='✕';
    del.addEventListener('click',()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id);renderMemoBody();});
    wrap.appendChild(del);
  }
  return wrap;
}

function createCheckItem(item){
  const ci=document.createElement('div');ci.className='check-item';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=item.done;
  const txt=document.createElement('input');txt.className='check-item-text'+(item.done?' done':'');
  txt.value=item.text;txt.placeholder='항목 입력...';
  cb.addEventListener('change',()=>txt.classList.toggle('done',cb.checked));
  ci.appendChild(cb);ci.appendChild(txt);return ci;
}

function addTextBlock(){
  if(!currentMemo)return;
  currentMemo.blocks.push({id:uid(),type:'text',content:''});
  renderMemoBody();
}
function addChecklistBlock(){
  if(!currentMemo)return;
  currentMemo.blocks.push({id:uid(),type:'checklist',items:[{text:'',done:false}]});
  renderMemoBody();
}
function addPhotoTextBlock(){
  if(!currentMemo)return;
  document.getElementById('photoInput').dataset.bid='split';
  document.getElementById('photoInput').click();
}
function addPhotoBlock(){
  if(!currentMemo)return;
  document.getElementById('photoInput').dataset.bid='new';
  document.getElementById('photoInput').click();
}
function addVideoBlock(){
  if(!currentMemo)return;
  currentMemo.blocks.push({id:uid(),type:'video',url:''});
  renderMemoBody();
}

function getYoutubeEmbedUrl(url){
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?`https://www.youtube.com/embed/${m[1]}`:null;
}

document.getElementById('photoInput').addEventListener('change',function(e){
  const bid=this.dataset.bid;
  const files=Array.from(e.target.files);
  if(!files.length)return;
  if(bid==='split'){
    const reader=new FileReader();
    reader.onload=ev=>{
      currentMemo.blocks.push({id:uid(),type:'split',photo:ev.target.result,text:''});
      renderMemoBody();
    };
    reader.readAsDataURL(files[0]);
    this.value='';return;
  }
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const block={id:uid(),type:'photo',photos:[ev.target.result],transforms:[{r:0,s:1,x:0,y:0}]};
      currentMemo.blocks.push(block);
      loaded++;
      if(loaded===files.length)renderMemoBody();
    };
    reader.readAsDataURL(file);
  });
  this.value='';
});

function showModal(title,placeholder,callback){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalInput').value='';
  document.getElementById('modalInput').placeholder=placeholder;
  modalCallback=callback;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('modalInput').focus(),100);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalConfirmBtn').addEventListener('click',()=>{
  const val=document.getElementById('modalInput').value.trim();
  if(val&&modalCallback)modalCallback(val);closeModal();
});
document.getElementById('modalInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modalConfirmBtn').click();});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showAddGroupModal(){
  showModal('대그룹 추가','대그룹 이름',name=>{data.groups.push({id:uid(),name,open:false,subs:[]});saveData();render();});
}
function showAddSubModal(gid){
  showModal('소그룹 추가','소그룹 이름',name=>{
    const g=data.groups.find(x=>x.id===gid);
    if(g){g.subs.push({id:uid(),name,blocks:[]});g.open=true;saveData();render();}
  });
}

function showCtx(e,type,id,parentId){
  e.preventDefault();ctxType=type;ctxTarget={id,parentId};
  const menu=document.getElementById('ctxMenu');
  document.getElementById('ctxAddSub').style.display=type==='group'?'block':'none';
  menu.style.left=Math.min(e.clientX,window.innerWidth-170)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-130)+'px';
  menu.classList.add('show');
}
document.addEventListener('click',()=>document.getElementById('ctxMenu').classList.remove('show'));
document.getElementById('ctxRename').addEventListener('click',()=>{
  showModal(ctxType==='group'?'대그룹 이름 변경':'소그룹 이름 변경','새 이름',name=>{
    if(ctxType==='group'){const g=data.groups.find(x=>x.id===ctxTarget.id);if(g){g.name=name;saveData();render();}}
    else{const g=data.groups.find(x=>x.id===ctxTarget.parentId);const s=g&&g.subs.find(x=>x.id===ctxTarget.id);if(s){s.name=name;saveData();render();}}
  });
});
document.getElementById('ctxAddSub').addEventListener('click',()=>showAddSubModal(ctxTarget.id));
document.getElementById('ctxDelete').addEventListener('click',()=>{
  if(ctxType==='group')data.groups=data.groups.filter(x=>x.id!==ctxTarget.id);
  else{const g=data.groups.find(x=>x.id===ctxTarget.parentId);if(g)g.subs=g.subs.filter(x=>x.id!==ctxTarget.id);}
  saveData();render();
});

render();
</script>
</body>
