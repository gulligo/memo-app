<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 메모장</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--border:#e5e5ea;--primary:#007aff;--text:#1c1c1e;--muted:#8e8e93;--red:#ff3b30;--green:#34c759;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:18px;font-weight:700;}
.icon-btn{border:none;background:none;font-size:22px;color:var(--primary);padding:4px;cursor:pointer;}
.main-view{padding:12px;}
.group-item{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.group-name{font-size:16px;font-weight:700;}
.group-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.group-arrow.open{transform:rotate(90deg);}
.group-children{display:none;border-top:1px solid var(--border);}
.group-children.open{display:block;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 12px 28px;border-bottom:1px solid var(--border);cursor:pointer;}
.sub-name{font-size:15px;}
.sub-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.memo-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column;}
.memo-view.show{display:flex;}
.memo-header{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.back-btn{border:none;background:none;font-size:36px;color:var(--primary);cursor:pointer;}
.save-btn{border:none;background:var(--primary);color:#fff;border-radius:8px;padding:7px 16px;font-size:15px;font-weight:700;}
.memo-body{flex:1;overflow-y:auto;padding:12px;}
.toolbar{background:#fff;border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;}
.tool-btn{border:none;background:var(--bg);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;}
.block{margin-bottom:10px;position:relative;}
.text-view{background:var(--card);border-radius:10px;padding:12px;font-size:15px;min-height:44px;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,0.05);}
.text-edit{display:none;width:100%;min-height:100px;border:2px solid var(--primary);border-radius:10px;padding:10px;outline:none;font-size:15px;}
.text-edit.show{display:block;}
.text-done-btn, .text-del-btn{display:none;position:absolute;top:-35px;background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;z-index:20;}
.text-done-btn.show, .text-del-btn.show{display:block;}
.text-done-btn{right:0;} .text-del-btn{right:65px; background:var(--red);}
.checklist-block{background:var(--card);border-radius:10px;padding:8px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.check-item-text{flex:1;border:none;background:none;font-size:15px;outline:none;}
.check-item-text.done{text-decoration:line-through;color:var(--muted);}
.add-check-btn{color:var(--primary);font-size:14px;border:none;background:none;padding:8px 0;width:100%;text-align:left;}
.photo-item{position:relative;margin-bottom:5px; touch-action:none;}
.photo-item img{width:100%;display:block; transform-origin:center;}
.photo-done-btn, .photo-del{display:none;position:absolute;z-index:30;}
.photo-item.editing .photo-done-btn, .photo-item.editing .photo-del{display:flex;}
.photo-done-btn{bottom:10px;left:10px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 15px;}
.photo-del{top:10px;right:10px;background:rgba(0,0,0,0.5);color:#fff;border-radius:50%;width:30px;height:30px;align-items:center;justify-content:center;}
.video-block{background:var(--card);border-radius:10px;overflow:hidden;padding:8px;position:relative;}
.video-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;}
.video-url-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.video-add-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:600;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:400;align-items:flex-end;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;}
.modal-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;border:none;border-radius:10px;padding:12px;font-weight:600;}
.modal-btn.confirm{background:var(--primary);color:#fff;}
</style>
</head>
<body>
<div class="header"><div class="header-title">용용이 메모장</div><button class="icon-btn" onclick="showAddGroupModal()">➕</button></div>
<div id="groupList" class="main-view"></div>
<div class="memo-view" id="memoView">
  <div class="memo-header"><button class="back-btn" onclick="closeMemo()">‹</button><button class="save-btn" id="saveBtn" onclick="saveMemo()">저장</button></div>
  <div class="memo-body" id="memoBody"></div>
  <div class="toolbar">
    <button class="tool-btn" onclick="addTextBlock()">📝 텍스트</button>
    <button class="tool-btn" onclick="addChecklistBlock()">☑️ 체크</button>
    <button class="tool-btn" onclick="addPhotoBlock()">🖼 사진</button>
    <button class="tool-btn" onclick="addVideoBlock()">🎬 동영상</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal"><input class="modal-input" id="modalInput" /><div class="modal-btns"><button class="modal-btn confirm" id="modalConfirmBtn">확인</button><button class="modal-btn" onclick="closeModal()">취소</button></div></div>
</div>
<input type="file" id="photoInput" accept="image/*" multiple style="display:none" />
<script>
const KEY='memo_app_v1';
let data=localStorage.getItem(KEY)?JSON.parse(localStorage.getItem(KEY)):{groups:[]};
let currentGroupId, currentSubId, currentMemo;
function saveData(){localStorage.setItem(KEY,JSON.stringify(data));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function render(){
  const list=document.getElementById('groupList'); list.innerHTML='';
  data.groups.forEach(g=>{
    const item=document.createElement('div'); item.className='group-item';
    const header=document.createElement('div'); header.className='group-header';
    header.innerHTML=`<div class="group-name">${g.name}</div><span class="group-arrow ${g.open?'open':''}">▶</span>`;
    header.onclick=()=>{g.open=!g.open; saveData(); render();};
    const children=document.createElement('div'); children.className='group-children'+(g.open?' open':'');
    (g.subs||[]).forEach(s=>{
      const si=document.createElement('div'); si.className='sub-item';
      si.innerHTML=`<div><div class="sub-name">${s.name}</div><div class="sub-meta">블록 ${(s.blocks||[]).length}개</div></div>`;
      si.onclick=()=>openMemo(g.id,s.id);
      children.appendChild(si);
    });
    const addSub=document.createElement('div'); addSub.className='sub-item'; addSub.style.color='var(--primary)'; addSub.textContent='+ 소그룹 추가';
    addSub.onclick=()=>showAddSubModal(g.id);
    children.appendChild(addSub);
    item.append(header, children); list.appendChild(item);
  });
}
function openMemo(gid, sid){
  currentGroupId=gid; currentSubId=sid;
  const g=data.groups.find(x=>x.id===gid); const s=g.subs.find(x=>x.id===sid);
  currentMemo=JSON.parse(JSON.stringify(s)); renderMemoBody();
  document.getElementById('memoView').classList.add('show');
}
function closeMemo(){document.getElementById('memoView').classList.remove('show');}
function saveMemo(){
  collectMemoBlocks();
  const g=data.groups.find(x=>x.id===currentGroupId);
  const idx=g.subs.findIndex(x=>x.id===currentSubId);
  g.subs[idx]=JSON.parse(JSON.stringify(currentMemo));
  saveData(); render();
  const btn=document.getElementById('saveBtn'); btn.textContent='✓'; setTimeout(()=>{btn.textContent='저장';},1000);
}
function collectMemoBlocks(){
  const nb=[];
  document.querySelectorAll('.block').forEach(b=>{
    const block=currentMemo.blocks.find(x=>x.id===b.dataset.bid);
    if(block){
      if(block.type==='text'){const t=b.querySelector('.text-edit'); if(t)block.content=t.value;}
      else if(block.type==='checklist'){
        block.items=[]; b.querySelectorAll('.check-item').forEach(ci=>{
          block.items.push({text:ci.querySelector('.check-item-text').value, done:ci.querySelector('input').checked});
        });
      }
      nb.push(block);
    }
  });
  currentMemo.blocks=nb;
}
function renderMemoBody(){
  const body=document.getElementById('memoBody'); body.innerHTML='';
  (currentMemo.blocks||[]).forEach(b=>body.appendChild(createBlockEl(b)));
}
function createBlockEl(block){
  const wrap=document.createElement('div'); wrap.className='block'; wrap.dataset.bid=block.id;
  if(block.type==='text'){
    const view=document.createElement('div'); view.className='text-view'; view.textContent=block.content||'길게 눌러 편집';
    const edit=document.createElement('textarea'); edit.className='text-edit'; edit.value=block.content||'';
    const done=document.createElement('button'); done.className='text-done-btn'; done.textContent='완료';
    const del=document.createElement('button'); del.className='text-del-btn'; del.textContent='삭제';
    let timer;
    view.ontouchstart=()=>{timer=setTimeout(()=>{view.style.display='none'; edit.classList.add('show'); done.classList.add('show'); del.classList.add('show'); edit.focus();},600);};
    view.ontouchend=()=>clearTimeout(timer);
    done.onclick=()=>{block.content=edit.value; view.textContent=edit.value||'길게 눌러 편집'; view.style.display=''; edit.classList.remove('show'); done.classList.remove('show'); del.classList.remove('show'); collectMemoBlocks();};
    del.onclick=()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id); renderMemoBody();};
    wrap.append(view, edit, done, del);
  } else if(block.type==='checklist'){
    const cl=document.createElement('div'); cl.className='checklist-block';
    (block.items||[]).forEach(item=>{
      const ci=document.createElement('div'); ci.className='check-item';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=item.done;
      const txt=document.createElement('input'); txt.className='check-item-text'+(item.done?' done':''); txt.value=item.text;
      cb.onchange=()=>{txt.classList.toggle('done', cb.checked); collectMemoBlocks();};
      ci.append(cb, txt); cl.appendChild(ci);
    });
    const addBtn=document.createElement('button'); addBtn.className='add-check-btn'; addBtn.textContent='+ 항목 추가';
    addBtn.onclick=()=>{collectMemoBlocks(); block.items.push({text:'', done:false}); renderMemoBody();};
    cl.appendChild(addBtn); wrap.appendChild(cl);
  } else if(block.type==='photo'){
    const pi=document.createElement('div'); pi.className='photo-item';
    const img=document.createElement('img'); img.src=block.photos[0];
    if(!block.transform) block.transform={r:0,s:1,x:0,y:0};
    const t=block.transform;
    const updateImg=()=>{img.style.transform=`translate(${t.x}px,${t.y}px) rotate(${t.r}deg) scale(${t.s})`;};
    updateImg();
    let timer, p1={dist:0,angle:0,scale:1,rotate:0}, dragging=false, lx, ly, sx, sy;
    pi.ontouchstart=(e)=>{
      if(!pi.classList.contains('editing')){ timer=setTimeout(()=>pi.classList.add('editing'),600); return; }
      if(e.touches.length===2){ p1.dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); p1.angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY, e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI; p1.scale=t.s; p1.rotate=t.r;
      } else { dragging=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY; sx=t.x; sy=t.y; }
    };
    pi.ontouchmove=(e)=>{ clearTimeout(timer); if(!pi.classList.contains('editing')) return; e.preventDefault();
      if(e.touches.length===2){ const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); const angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY, e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI; t.s=p1.scale*(dist/p1.dist); t.r=p1.rotate+(angle-p1.angle);
      } else if(dragging){ t.x=sx+(e.touches[0].clientX-lx); t.y=sy+(e.touches[0].clientY-ly); }
      updateImg();
    };
    pi.ontouchend=()=>{clearTimeout(timer); dragging=false;};
    const pDone=document.createElement('button'); pDone.className='photo-done-btn'; pDone.textContent='완료'; pDone.onclick=()=>pi.classList.remove('editing');
    const pDel=document.createElement('div'); pDel.className='photo-del'; pDel.innerHTML='✕'; pDel.onclick=()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id); renderMemoBody();};
    pi.append(img, pDone, pDel); wrap.appendChild(pi);
  } else if(block.type==='video'){
    const vb=document.createElement('div'); vb.className='video-block';
    if(block.url){
      const m=block.url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/))([a-zA-Z0-9_-]{11})/);
      if(m){const f=document.createElement('iframe'); f.className='video-frame'; f.src=`https://www.youtube.com/embed/${m[1]}`; f.allowFullscreen=true; vb.appendChild(f);}
    } else {
      const inp=document.createElement('input'); inp.className='video-url-input'; inp.placeholder='YouTube 링크';
      const btn=document.createElement('button'); btn.className='video-add-btn'; btn.textContent='추가';
      btn.onclick=()=>{block.url=inp.value; renderMemoBody();};
      vb.append(inp, btn);
    }
    const vDel=document.createElement('div'); vDel.className='photo-del'; vDel.style.display='flex'; vDel.innerHTML='✕'; vDel.onclick=()=>{currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id); renderMemoBody();};
    vb.appendChild(vDel); wrap.appendChild(vDel); wrap.appendChild(vb);
  }
  return wrap;
}
function addTextBlock(){currentMemo.blocks.push({id:uid(),type:'text',content:''}); renderMemoBody();}
function addChecklistBlock(){currentMemo.blocks.push({id:uid(),type:'checklist',items:[{text:'',done:false}]}); renderMemoBody();}
function addPhotoBlock(){document.getElementById('photoInput').click();}
function addVideoBlock(){currentMemo.blocks.push({id:uid(),type:'video',url:''}); renderMemoBody();}
document.getElementById('photoInput').onchange=(e)=>{
  const files = e.target.files; if(!files.length) return;
  let loaded = 0;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      currentMemo.blocks.push({id:uid(),type:'photo',photos:[ev.target.result],transform:{r:0,s:1,x:0,y:0}});
      loaded++; if(loaded === files.length) renderMemoBody();
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
};
function showAddGroupModal(){document.getElementById('modalOverlay').classList.add('show'); document.getElementById('modalConfirmBtn').onclick=()=>{const n=document.getElementById('modalInput').value; if(n){data.groups.push({id:uid(),name:n,open:true,subs:[]}); saveData(); render(); closeModal();}};}
function showAddSubModal(gid){document.getElementById('modalOverlay').classList.add('show'); document.getElementById('modalConfirmBtn').onclick=()=>{const n=document.getElementById('modalInput').value; if(n){const g=data.groups.find(x=>x.id===gid); g.subs.push({id:uid(),name:n,blocks:[]}); saveData(); render(); closeModal();}};}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show'); document.getElementById('modalInput').value='';}
render();
</script>
</body>
</html>
