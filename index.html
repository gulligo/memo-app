<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용용이 메모장</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--line:#e5e5ea;--blue:#007aff;--text:#1c1c1e;--muted:#8e8e93}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea{font:inherit}
.header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px}
.icon{border:none;background:none;color:var(--blue);font-size:24px;cursor:pointer}
.main{padding:12px}
.group{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:8px}
.ghead{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.gitems{display:none;border-top:1px solid var(--line)}
.gitems.open{display:block}
.sub{padding:12px 16px 12px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;cursor:pointer}
.addsub{padding:12px;text-align:center;color:var(--blue);cursor:pointer}

.memo{display:none;position:fixed;inset:0;background:var(--bg);z-index:10;flex-direction:column}
.memo.show{display:flex}
.mhead{background:#fff;border-bottom:1px solid var(--line);padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.back{border:none;background:none;color:var(--blue);font-size:34px;cursor:pointer}
.save{border:none;background:var(--blue);color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer}
.canvas{flex:1;overflow:auto;position:relative;padding:12px 12px 80px}
.toolbar{background:#fff;border-top:1px solid var(--line);padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap}
.tool{border:none;background:#eef3ff;padding:8px 12px;border-radius:8px;cursor:pointer}

.textBlock{position:absolute;min-width:120px;z-index:20}
.textBox{background:#fff;border:2px solid var(--blue);border-radius:10px;padding:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.move{background:#eee;border-radius:8px;padding:6px 10px;text-align:center;font-size:12px;margin-bottom:6px;cursor:grab}
.row{display:flex;gap:6px;margin-bottom:6px}
.smallbtn{border:none;background:#eee;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}
.ta{width:100%;border:none;outline:none;resize:none;background:transparent;min-height:80px}

.photoWrap{position:relative;margin-bottom:10px}
.photoWrap img{width:100%;display:block;border-radius:10px}

.modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;align-items:flex-end}
.modalBg.show{display:flex}
.modal{background:#fff;width:100%;padding:20px 16px;border-radius:16px 16px 0 0}
.modal h2{font-size:16px;margin-bottom:12px}
.modal input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.mrow{display:flex;gap:8px}
.mrow button{flex:1;border:none;border-radius:10px;padding:12px;cursor:pointer}
.ok{background:var(--blue);color:#fff}
.cancel{background:#eee}
</style>
</head>
<body>
<div class="header">
  <h1>용용이 메모장</h1>
  <button class="icon" onclick="openGroupModal()">＋</button>
</div>

<div class="main" id="groups"></div>

<div class="memo" id="memo">
  <div class="mhead">
    <button class="back" onclick="closeMemo()">‹</button>
    <button class="save" onclick="saveMemo()">저장</button>
  </div>
  <div class="canvas" id="canvas"></div>
  <div class="toolbar">
    <button class="tool" onclick="addText()">텍스트</button>
    <button class="tool" onclick="addPhoto()">사진</button>
  </div>
</div>

<div class="modalBg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">이름 입력</h2>
    <input id="modalInput">
    <div class="mrow">
      <button class="cancel" onclick="closeModal()">취소</button>
      <button class="ok" id="modalOk">확인</button>
    </div>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none">

<script>
const KEY='yy_memo_restore_v1';
const groupsEl=document.getElementById('groups');
const memoEl=document.getElementById('memo');
const canvas=document.getElementById('canvas');
const modalBg=document.getElementById('modalBg');
const modalTitle=document.getElementById('modalTitle');
const modalInput=document.getElementById('modalInput');
const modalOk=document.getElementById('modalOk');
const photoInput=document.getElementById('photoInput');

let data=loadData();
let currentGroupId=null,currentSubId=null,currentMemo=null;
let modalFn=null;

function loadData(){
  try{return JSON.parse(localStorage.getItem(KEY))||{groups:[]};}
  catch(e){return {groups:[]};}
}
function saveData(){
  localStorage.setItem(KEY,JSON.stringify(data));
}
function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

function renderGroups(){
  groupsEl.innerHTML='';
  data.groups.forEach(g=>{
    const box=document.createElement('div');
    box.className='group';

    const head=document.createElement('div');
    head.className='ghead';
    head.innerHTML=`<strong>${g.name}</strong><span>${g.open?'▼':'▶'}</span>`;
    head.onclick=()=>{g.open=!g.open;saveData();renderGroups();};

    const items=document.createElement('div');
    items.className='gitems'+(g.open?' open':'');
    (g.subs||[]).forEach(s=>{
      const row=document.createElement('div');
      row.className='sub';
      row.innerHTML=`<span>${s.name}</span><span>›</span>`;
      row.onclick=()=>openMemo(g.id,s.id);
      items.appendChild(row);
    });

    const add=document.createElement('div');
    add.className='addsub';
    add.textContent='+ 소그룹 추가';
    add.onclick=()=>openSubModal(g.id);
    items.appendChild(add);

    box.appendChild(head);
    box.appendChild(items);
    groupsEl.appendChild(box);
  });
}

function openModal(title,fn){
  modalTitle.textContent=title;
  modalInput.value='';
  modalFn=fn;
  modalBg.classList.add('show');
  setTimeout(()=>modalInput.focus(),50);
}
function closeModal(){
  modalBg.classList.remove('show');
}
modalOk.onclick=()=>{
  const v=modalInput.value.trim();
  if(v&&modalFn)modalFn(v);
  closeModal();
};

function openGroupModal(){
  openModal('대그룹 추가',name=>{
    data.groups.push({id:uid(),name,open:false,subs:[]});
    saveData();
    renderGroups();
  });
}
function openSubModal(gid){
  openModal('소그룹 추가',name=>{
    const g=data.groups.find(x=>x.id===gid);
    if(!g)return;
    g.subs.push({id:uid(),name,blocks:[]});
    g.open=true;
    saveData();
    renderGroups();
  });
}

function openMemo(gid,sid){
  currentGroupId=gid;
  currentSubId=sid;
  const g=data.groups.find(x=>x.id===gid);
  const s=g.subs.find(x=>x.id===sid);
  currentMemo=JSON.parse(JSON.stringify(s));
  currentMemo.blocks ||= [];
  renderMemo();
  memoEl.classList.add('show');
}
function closeMemo(){
  memoEl.classList.remove('show');
  currentMemo=null;
}
function saveMemo(){
  const g=data.groups.find(x=>x.id===currentGroupId);
  const i=g.subs.findIndex(x=>x.id===currentSubId);
  g.subs[i]=JSON.parse(JSON.stringify(currentMemo));
  saveData();
  renderGroups();
}

function renderMemo(){
  canvas.innerHTML='';
  currentMemo.blocks.forEach(b=>{
    if(b.type==='text'){
      const wrap=document.createElement('div');
      wrap.className='textBlock';
      wrap.style.left=(b.x||20)+'px';
      wrap.style.top=(b.y||80)+'px';
      wrap.style.width=(b.w||180)+'px';

      const box=document.createElement('div');
      box.className='textBox';

      const move=document.createElement('div');
      move.className='move';
      move.textContent='이동';

      const row=document.createElement('div');
      row.className='row';

      const smaller=document.createElement('button');
      smaller.className='smallbtn';
      smaller.textContent='작게';

      const bigger=document.createElement('button');
      bigger.className='smallbtn';
      bigger.textContent='크게';

      const ta=document.createElement('textarea');
      ta.className='ta';
      ta.value=b.text||'';
      ta.style.height=(b.h||120)+'px';
      ta.style.fontSize=(b.size||16)+'px';
      ta.oninput=()=>b.text=ta.value;

      bigger.onclick=()=>{
        b.h=(b.h||120)+80;
        b.size=(b.size||16)+4;
        b.w=(b.w||180)+40;
        renderMemo();
      };
      smaller.onclick=()=>{
        b.h=Math.max(80,(b.h||120)-80);
        b.size=Math.max(10,(b.size||16)-4);
        b.w=Math.max(120,(b.w||180)-40);
        renderMemo();
      };

      let dragging=false,startX=0,startY=0,startLeft=0,startTop=0;
      move.ontouchstart=e=>{
        dragging=true;
        startX=e.touches[0].clientX;
        startY=e.touches[0].clientY;
        startLeft=b.x||20;
        startTop=b.y||80;
      };
      move.ontouchmove=e=>{
        if(!dragging)return;
        const dx=e.touches[0].clientX-startX;
        const dy=e.touches[0].clientY-startY;
        b.x=startLeft+dx;
        b.y=startTop+dy;
        wrap.style.left=b.x+'px';
        wrap.style.top=b.y+'px';
      };
      move.ontouchend=()=>dragging=false;

      row.appendChild(smaller);
      row.appendChild(bigger);
      box.appendChild(move);
      box.appendChild(row);
      box.appendChild(ta);
      wrap.appendChild(box);
      canvas.appendChild(wrap);
    }

    if(b.type==='photo'){
      const wrap=document.createElement('div');
      wrap.className='photoWrap';
      const img=document.createElement('img');
      img.src=b.src;
      wrap.appendChild(img);
      canvas.appendChild(wrap);
    }
  });
}

function addText(){
  if(!currentMemo)return;
  currentMemo.blocks.push({
    id:uid(),
    type:'text',
    text:'',
    x:20,
    y:80,
    w:180,
    h:120,
    size:16
  });
  renderMemo();
}
function addPhoto(){
  photoInput.click();
}
photoInput.onchange=e=>{
  const file=e.target.files[0];
  if(!file||!currentMemo)return;
  const r=new FileReader();
  r.onload=x=>{
    currentMemo.blocks.push({id:uid(),type:'photo',src:x.target.result});
    renderMemo();
  };
  r.readAsDataURL(file);
  e.target.value='';
};

renderGroups();
</script>
</body>
</html>
