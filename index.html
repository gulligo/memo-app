<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 메모장</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--border:#e5e5ea;--primary:#007aff;--text:#1c1c1e;--muted:#8e8e93;--red:#ff3b30;--green:#34c759;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:18px;font-weight:700;}
.icon-btn{border:none;background:none;font-size:22px;color:var(--primary);padding:4px;cursor:pointer;}
.main-view{padding:12px;}
.group-item{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.group-name{font-size:16px;font-weight:700;}
.group-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.group-arrow.open{transform:rotate(90deg);}
.group-children{display:none;border-top:1px solid var(--border);}
.group-children.open{display:block;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.sub-item:last-child{border-bottom:none;}
.memo-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column;}
.memo-view.show{display:flex;}
.memo-header{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.back-btn{border:none;background:none;font-size:30px;color:var(--primary);cursor:pointer;}
.save-btn{border:none;background:var(--primary);color:#fff;border-radius:8px;padding:7px 16px;font-size:15px;font-weight:700;}
.memo-body{flex:1;overflow-y:auto;padding:12px;}
.toolbar{background:#fff;border-top:1px solid var(--border);padding:10px;display:flex;gap:8px;overflow-x:auto;}
.tool-btn{border:none;background:var(--bg);border-radius:8px;padding:8px 12px;font-size:13px;white-space:nowrap;}
.block{margin-bottom:12px;position:relative;background:var(--card);border-radius:10px;padding:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
.block.dragging{opacity:0.5;background:var(--border);}
.handle{display:inline-block;width:30px;height:30px;background:var(--bg);border-radius:5px;text-align:center;line-height:30px;margin-right:10px;cursor:grab;touch-action:none;user-select:none;}
.text-area{width:100%;border:none;outline:none;resize:none;font-size:15px;font-family:inherit;background:transparent;}
.block-del{position:absolute;top:5px;right:5px;border:none;background:none;color:var(--red);font-size:18px;cursor:pointer;padding:5px;}
.photo-block img{width:100%;border-radius:8px;display:block;}
.check-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.check-item input[type="checkbox"]{width:20px;height:20px;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:320px;}
.modal-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;margin:15px 0;outline:none;}
.modal-btns{display:flex;gap:10px;}
.modal-btn{flex:1;border:none;border-radius:8px;padding:10px;font-weight:600;}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">용용이 메모장</div>
  <button class="icon-btn" onclick="addGroup()">➕</button>
</div>
<div class="main-view" id="groupList"></div>
<div class="memo-view" id="memoView">
  <div class="memo-header">
    <button class="back-btn" onclick="closeMemo()">‹</button>
    <div id="memoTitle" style="font-weight:700;"></div>
    <button class="save-btn" onclick="saveMemo()">저장</button>
  </div>
  <div class="memo-body" id="memoBody"></div>
  <div class="toolbar">
    <button class="tool-btn" onclick="addBlock('text')">📝 텍스트</button>
    <button class="tool-btn" onclick="addBlock('check')">☑️ 체크</button>
    <button class="tool-btn" onclick="document.getElementById('imgInp').click()">🖼 사진</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <input class="modal-input" id="modalInput" />
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">취소</button>
      <button class="modal-btn" style="background:var(--primary);color:#fff;" id="modalConfirm">확인</button>
    </div>
  </div>
</div>
<input type="file" id="imgInp" accept="image/*" hidden onchange="handleImg(this)" />
<script>
const KEY='memo_app_v1';
let data = JSON.parse(localStorage.getItem(KEY)) || {groups:[]};
let curG=null, curS=null;

function render(){
  const list=document.getElementById('groupList'); list.innerHTML='';
  data.groups.forEach(g=>{
    const div=document.createElement('div'); div.className='group-item';
    div.innerHTML=`<div class="group-header" onclick="g.open=!g.open;save();render();">
      <span class="group-name">${g.name}</span><span class="group-arrow ${g.open?'open':''}">▶</span></div>
      <div class="group-children ${g.open?'open':''}"></div>`;
    const childBox=div.querySelector('.group-children');
    g.subs.forEach(s=>{
      const sDiv=document.createElement('div'); sDiv.className='sub-item';
      sDiv.innerHTML=`<span>${s.name}</span><span>›</span>`;
      sDiv.onclick=()=>openMemo(g,s);
      childBox.appendChild(sDiv);
    });
    const addS=document.createElement('div'); addS.className='sub-item';
    addS.style.color='var(--primary)'; addS.innerHTML='+ 소그룹 추가';
    addS.onclick=()=>addSub(g);
    childBox.appendChild(addS);
    list.appendChild(div);
  });
}

function openMemo(g,s){
  curG=g; curS=s;
  document.getElementById('memoTitle').textContent=s.name;
  document.getElementById('memoView').classList.add('show');
  renderBlocks();
}

function renderBlocks(){
  const body=document.getElementById('memoBody'); body.innerHTML='';
  curS.blocks.forEach((b,idx)=>{
    const div=document.createElement('div'); div.className='block';
    div.draggable=true; div.dataset.index=idx;
    
    // 핸들(이동 버튼)
    const handle=document.createElement('span'); handle.className='handle'; handle.textContent='☰';
    div.appendChild(handle);

    if(b.type==='text'){
      const ta=document.createElement('textarea'); ta.className='text-area'; ta.value=b.val;
      ta.oninput=()=>{b.val=ta.value; ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px';};
      div.appendChild(ta);
      setTimeout(()=>{ta.style.height=ta.scrollHeight+'px';},0);
    } else if(b.type==='img'){
      const img=document.createElement('img'); img.src=b.val; div.appendChild(img);
    } else if(b.type==='check'){
      b.items.forEach(it=>{
        const iDiv=document.createElement('div'); iDiv.className='check-item';
        iDiv.innerHTML=`<input type="checkbox" ${it.done?'checked':''}> <input type="text" value="${it.val}" style="border:none;outline:none;flex:1;">`;
        iDiv.querySelector('input[type="checkbox"]').onchange=(e)=>{it.done=e.target.checked;};
        iDiv.querySelector('input[type="text"]').oninput=(e)=>{it.val=e.target.value;};
        div.appendChild(iDiv);
      });
    }

    const del=document.createElement('button'); del.className='block-del'; del.innerHTML='✕';
    del.onclick=()=>{curS.blocks.splice(idx,1); renderBlocks();};
    div.appendChild(del);

    // 드래그 앤 드롭 이벤트 (순서 변경)
    div.ontouchstart=(e)=>{ if(e.target.className==='handle') div.classList.add('dragging'); };
    div.ontouchend=()=>{ div.classList.remove('dragging'); reorder(); };
    div.ondragstart=()=>div.classList.add('dragging');
    div.ondragend=()=>div.classList.remove('dragging');
    
    body.appendChild(div);
  });
  
  body.ondragover=(e)=>{
    e.preventDefault();
    const dragging=document.querySelector('.dragging');
    const after=getDragAfterElement(body, e.clientY || e.touches[0].clientY);
    if(after==null) body.appendChild(dragging); else body.insertBefore(dragging, after);
  };
  body.ontouchmove=(e)=>{
    const dragging=document.querySelector('.dragging'); if(!dragging) return;
    e.preventDefault();
    const after=getDragAfterElement(body, e.touches[0].clientY);
    if(after==null) body.appendChild(dragging); else body.insertBefore(dragging, after);
  };
}

function getDragAfterElement(container, y){
  const els=[...container.querySelectorAll('.block:not(.dragging)')];
  return els.reduce((closest, child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0 && offset>closest.offset) return {offset:offset, element:child};
    else return closest;
  },{offset:Number.NEGATIVE_INFINITY}).element;
}

function reorder(){
  const newBlocks=[];
  document.querySelectorAll('.block').forEach(el=>{
    newBlocks.push(curS.blocks[el.dataset.index]);
  });
  curS.blocks=newBlocks;
  renderBlocks();
}

function addBlock(type){
  if(type==='text') curS.blocks.push({type:'text', val:''});
  else if(type==='check') curS.blocks.push({type:'check', items:[{val:'',done:false}]});
  renderBlocks();
}

function handleImg(inp){
  const file=inp.files[0]; if(!file) return;
  const rd=new FileReader(); rd.onload=(e)=>{curS.blocks.push({type:'img', val:e.target.result}); renderBlocks();};
  rd.readAsDataURL(file); inp.value='';
}

function save(){localStorage.setItem(KEY, JSON.stringify(data));}
function saveMemo(){save(); render(); closeMemo();}
function closeMemo(){document.getElementById('memoView').classList.remove('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

function addGroup(){
  showModal('대그룹 추가', (val)=>{data.groups.push({name:val, open:true, subs:[]}); save(); render();});
}
function addSub(g){
  showModal('소그룹 추가', (val)=>{g.subs.push({name:val, blocks:[]}); save(); render();});
}
function showModal(title, cb){
  document.getElementById('modalTitle').textContent=title;
  const inp=document.getElementById('modalInput'); inp.value='';
  document.getElementById('modalOverlay').classList.add('show'); inp.focus();
  document.getElementById('modalConfirm').onclick=()=>{if(inp.value){cb(inp.value); closeModal();}};
}

render();
</script>
</body>
</html>
