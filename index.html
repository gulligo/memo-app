<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 메모장</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.png" type="image/png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --border:#e5e5ea;
  --primary:#007aff;
  --text:#1c1c1e;
  --muted:#8e8e93;
  --red:#ff3b30;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:18px;font-weight:700;}
.icon-btn{border:none;background:none;font-size:22px;color:var(--primary);padding:4px;cursor:pointer;}
.main-view{padding:12px;}
.group-item{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.group-name{font-size:16px;font-weight:700;}
.group-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.group-arrow.open{transform:rotate(90deg);}
.group-children{display:none;border-top:1px solid var(--border);}
.group-children.open{display:block;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 12px 28px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.sub-item:last-child{border-bottom:none;}
.sub-name{font-size:15px;}
.sub-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.sub-arrow{font-size:16px;color:var(--muted);}
.memo-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column;}
.memo-view.show{display:flex;}
.memo-header{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.memo-title-input{font-size:17px;font-weight:700;border:none;background:none;flex:1;outline:none;margin:0 10px;}
.memo-body{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;}
.toolbar{background:#fff;border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.tool-btn{border:none;background:var(--bg);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.block{margin-bottom:8px;position:relative;}
.text-block{width:100%;min-height:44px;border:none;background:var(--card);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--text);outline:none;resize:none;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.checklist-block{background:var(--card);border-radius:10px;padding:8px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.check-item:last-child{border-bottom:none;}
.check-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--primary);flex-shrink:0;}
.check-item-text{flex:1;border:none;background:none;font-size:15px;color:var(--text);outline:none;font-family:inherit;}
.check-item-text.done{text-decoration:line-through;color:var(--muted);}
.add-check-btn{display:flex;align-items:center;gap:6px;color:var(--primary);font-size:14px;border:none;background:none;padding:8px 0;cursor:pointer;width:100%;}
.photo-block{background:var(--card);border-radius:10px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.photo-item{position:relative;margin-bottom:6px;border-radius:8px;overflow:hidden;}
.photo-item img{width:100%;display:block;border-radius:8px;cursor:pointer;}
.photo-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.video-block{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:8px;}
.video-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;}
.video-url-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px;}
.video-add-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;}
.block-del{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.photo-viewer{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:300;flex-direction:column;}
.photo-viewer.show{display:flex;}
.viewer-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.viewer-close{color:#fff;font-size:16px;border:none;background:none;cursor:pointer;}
.viewer-save{color:#fff;font-size:15px;font-weight:700;border:none;background:var(--primary);border-radius:8px;padding:6px 14px;cursor:pointer;}
.viewer-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.viewer-img{max-width:100%;max-height:100%;transform-origin:center;user-select:none;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:400;align-items:flex-end;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;}
.modal-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;outline:none;font-family:inherit;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-btn.confirm{background:var(--primary);color:#fff;}
.modal-btn.cancel{background:var(--bg);color:var(--text);}
.ctx-menu{display:none;position:fixed;background:var(--card);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);overflow:hidden;z-index:500;min-width:160px;}
.ctx-menu.show{display:block;}
.ctx-item{padding:12px 16px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--border);}
.ctx-item:last-child{border-bottom:none;}
.ctx-item.danger{color:var(--red);}
</style>
</head>
<body>
  <div class="header">
  <div class="header-title">용용이 메모장</div>
  <button class="icon-btn" onclick="showAddGroupModal()">➕</button>
</div>

<div class="main-view">
  <div id="groupList"></div>
</div>

<div class="memo-view" id="memoView">
  <div class="memo-header">
    <button class="icon-btn" onclick="closeMemo()">‹</button>
    <input class="memo-title-input" id="memoTitleInput" placeholder="제목" />
    <button class="icon-btn" onclick="saveMemo()">저장</button>
  </div>
  <div class="memo-body" id="memoBody"></div>
  <div class="toolbar">
    <button class="tool-btn" onclick="addTextBlock()">📝 텍스트</button>
    <button class="tool-btn" onclick="addChecklistBlock()">☑️ 체크</button>
    <button class="tool-btn" onclick="addPhotoBlock()">🖼 사진</button>
    <button class="tool-btn" onclick="addVideoBlock()">🎬 동영상</button>
  </div>
</div>

<div class="photo-viewer" id="photoViewer">
  <div class="viewer-header">
    <button class="viewer-close" onclick="closeViewer()">✕ 닫기</button>
    <button class="viewer-save" onclick="saveViewer()">저장</button>
  </div>
  <div class="viewer-img-wrap" id="viewerImgWrap">
    <img class="viewer-img" id="viewerImg" />
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <input class="modal-input" id="modalInput" placeholder="이름 입력" />
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" id="modalConfirmBtn">확인</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxRename">이름 변경</div>
  <div class="ctx-item" id="ctxAddSub">소그룹 추가</div>
  <div class="ctx-item danger" id="ctxDelete">삭제</div>
</div>

<input type="file" id="photoInput" accept="image/*" multiple style="display:none" />
<script>
const KEY='memo_app_v1';
function loadData(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):{groups:[]};}catch(e){return{groups:[]};}}
function saveData(){localStorage.setItem(KEY,JSON.stringify(data));}
let data=loadData();
let currentGroupId=null,currentSubId=null,currentMemo=null;
let ctxTarget=null,ctxType=null,modalCallback=null;
let viewerScale=1,viewerRotate=0,viewerTransX=0,viewerTransY=0;
let pinchStartDist=0,pinchStartScale=1,pinchStartAngle=0,pinchStartRotate=0;
let dragStartX=0,dragStartY=0,dragStartTX=0,dragStartTY=0;
let isDragging=false;
let viewerBlockId=null,viewerPhotoIdx=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function render(){
  const list=document.getElementById('groupList');
  list.innerHTML='';
  data.groups.forEach(g=>{
    const item=document.createElement('div');
    item.className='group-item';
    const header=document.createElement('div');
    header.className='group-header';
    header.innerHTML=`<div class="group-name">${g.name}</div><span class="group-arrow ${g.open?'open':''}">▶</span>`;
    header.addEventListener('click',()=>toggleGroup(g.id));
    header.addEventListener('contextmenu',e=>showCtx(e,'group',g.id));
    const children=document.createElement('div');
    children.className='group-children'+(g.open?' open':'');
    (g.subs||[]).forEach(s=>{
      const si=document.createElement('div');
      si.className='sub-item';
      si.innerHTML=`<div><div class="sub-name">${s.name}</div><div class="sub-meta">${getSubMeta(s)}</div></div><span class="sub-arrow">›</span>`;
      si.addEventListener('click',()=>openMemo(g.id,s.id));
      si.addEventListener('contextmenu',e=>showCtx(e,'sub',s.id,g.id));
      children.appendChild(si);
    });
    const addSub=document.createElement('div');
    addSub.className='sub-item';
    addSub.style.cssText='color:var(--primary);justify-content:center;';
    addSub.textContent='+ 소그룹 추가';
    addSub.addEventListener('click',()=>showAddSubModal(g.id));
    children.appendChild(addSub);
    item.appendChild(header);item.appendChild(children);
    list.appendChild(item);
  });
}

function getSubMeta(s){
  if(!s.blocks||!s.blocks.length)return '비어있음';
  const parts=[];
  const t=s.blocks.filter(b=>b.type==='text'&&b.content).length;
  const c=s.blocks.filter(b=>b.type==='checklist').length;
  const p=s.blocks.filter(b=>b.type==='photo').length;
  const v=s.blocks.filter(b=>b.type==='video'&&b.url).length;
  if(t)parts.push(`텍스트 ${t}`);
  if(c)parts.push(`체크 ${c}`);
  if(p)parts.push(`사진 ${p}`);
  if(v)parts.push(`동영상 ${v}`);
  return parts.join(' · ')||'비어있음';
}

function toggleGroup(gid){
  const g=data.groups.find(x=>x.id===gid);
  if(g){g.open=!g.open;saveData();render();}
}

function openMemo(gid,sid){
  currentGroupId=gid;currentSubId=sid;
  const g=data.groups.find(x=>x.id===gid);
  const s=g.subs.find(x=>x.id===sid);
  currentMemo=JSON.parse(JSON.stringify(s));
  document.getElementById('memoTitleInput').value=s.name;
  renderMemoBody();
  document.getElementById('memoView').classList.add('show');
}

function closeMemo(){
  document.getElementById('memoView').classList.remove('show');
  currentMemo=null;
}

function saveMemo(){
  if(!currentMemo)return;
  const g=data.groups.find(x=>x.id===currentGroupId);
  const idx=g.subs.findIndex(x=>x.id===currentSubId);
  currentMemo.name=document.getElementById('memoTitleInput').value||'제목없음';
  collectMemoBlocks();
  g.subs[idx]=JSON.parse(JSON.stringify(currentMemo));
  saveData();render();closeMemo();
}

function collectMemoBlocks(){
  const body=document.getElementById('memoBody');
  const nb=[];
  body.querySelectorAll('.block').forEach(b=>{
    const bid=b.dataset.bid;
    const block=currentMemo.blocks.find(x=>x.id===bid);
    if(!block)return;
    if(block.type==='text')block.content=b.querySelector('.text-block').value;
    else if(block.type==='checklist'){
      block.items=[];
      b.querySelectorAll('.check-item').forEach(ci=>{
        block.items.push({text:ci.querySelector('.check-item-text').value,done:ci.querySelector('input').checked});
      });
    }
    nb.push(block);
  });
  currentMemo.blocks=nb;
}

function renderMemoBody(){
  const body=document.getElementById('memoBody');
  body.innerHTML='';
  (currentMemo.blocks||[]).forEach(b=>body.appendChild(createBlockEl(b)));
}

function createBlockEl(block){
  const wrap=document.createElement('div');
  wrap.className='block';wrap.dataset.bid=block.id;
  const del=document.createElement('button');
  del.className='block-del';del.textContent='✕';
  del.addEventListener('click',()=>{collectMemoBlocks();currentMemo.blocks=currentMemo.blocks.filter(x=>x.id!==block.id);renderMemoBody();});

  if(block.type==='text'){
    const ta=document.createElement('textarea');
    ta.className='text-block';ta.value=block.content||'';ta.placeholder='내용을 입력하세요...';
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    setTimeout(()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';},10);
    wrap.appendChild(ta);

  }else if(block.type==='checklist'){
    const cl=document.createElement('div');cl.className='checklist-block';
    (block.items||[]).forEach(item=>cl.appendChild(createCheckItem(item)));
    const addBtn=document.createElement('button');addBtn.className='add-check-btn';addBtn.textContent='＋ 항목 추가';
    addBtn.addEventListener('click',()=>{collectMemoBlocks();currentMemo.blocks.find(x=>x.id===block.id).items.push({text:'',done:false});renderMemoBody();});
    cl.appendChild(addBtn);wrap.appendChild(cl);

  }else if(block.type==='photo'){
    const pb=document.createElement('div');pb.className='photo-block';
    (block.photos||[]).forEach((p,i)=>{
      const t=(block.transforms&&block.transforms[i])||{rotate:0,scale:1,x:0,y:0};
      const pi=document.createElement('div');pi.className='photo-item';
      const img=document.createElement('img');
      img.src=p;
      img.style.transform=`translate(${t.x||0}px,${t.y||0}px) rotate(${t.rotate||0}deg) scale(${t.scale||1})`;
      img.addEventListener('click',()=>openViewer(block.id,i,p,t));
      const pd=document.createElement('button');pd.className='photo-del';pd.textContent='✕';
      pd.addEventListener('click',e=>{
        e.stopPropagation();
        collectMemoBlocks();
        const b=currentMemo.blocks.find(x=>x.id===block.id);
        b.photos.splice(i,1);
        if(b.transforms)b.transforms.splice(i,1);
        renderMemoBody();
      });
      pi.appendChild(img);pi.appendChild(pd);pb.appendChild(pi);
    });
    wrap.appendChild(pb);

  }else if(block.type==='video'){
    const vb=document.createElement('div');vb.className='video-block';
    if(block.url){
      const eu=getYoutubeEmbedUrl(block.url);
      if(eu){
        const iframe=document.createElement('iframe');
        iframe.className='video-frame';iframe.src=eu;iframe.allowFullscreen=true;
        iframe.allow='accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        vb.appendChild(iframe);
      }
    }else{
      const inp=document.createElement('input');inp.className='video-url-input';inp.placeholder='YouTube 링크 붙여넣기';
      const btn=document.createElement('button');btn.className='video-add-btn';btn.textContent='동영상 추가';
      btn.addEventListener('click',()=>{collectMemoBlocks();currentMemo.blocks.find(x=>x.id===block.id).url=inp.value.trim();renderMemoBody();});
      vb.appendChild(inp);vb.appendChild(btn);
    }
    wrap.appendChild(vb);
  }

  wrap.appendChild(del);
  return wrap;
}

function createCheckItem(item){
  const ci=document.createElement('div');ci.className='check-item';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=item.done;
  const txt=document.createElement('input');
  txt.className='check-item-text'+(item.done?' done':'');
  txt.value=item.text;txt.placeholder='항목 입력...';
  cb.addEventListener('change',()=>txt.classList.toggle('done',cb.checked));
  ci.appendChild(cb);ci.appendChild(txt);
  return ci;
}
  function addTextBlock(){if(!currentMemo)return;collectMemoBlocks();currentMemo.blocks.push({id:uid(),type:'text',content:''});renderMemoBody();}
function addChecklistBlock(){if(!currentMemo)return;collectMemoBlocks();currentMemo.blocks.push({id:uid(),type:'checklist',items:[{text:'',done:false}]});renderMemoBody();}
function addPhotoBlock(){
  if(!currentMemo)return;
  const block={id:uid(),type:'photo',photos:[],transforms:[]};
  collectMemoBlocks();currentMemo.blocks.push(block);renderMemoBody();
  setTimeout(()=>{document.getElementById('photoInput').dataset.bid=block.id;document.getElementById('photoInput').click();},100);
}
function addVideoBlock(){if(!currentMemo)return;collectMemoBlocks();currentMemo.blocks.push({id:uid(),type:'video',url:''});renderMemoBody();}

function getYoutubeEmbedUrl(url){
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?`https://www.youtube.com/embed/${m[1]}`:null;
}

document.getElementById('photoInput').addEventListener('change',function(e){
  const bid=this.dataset.bid;
  const files=Array.from(e.target.files);
  if(!files.length)return;
  collectMemoBlocks();
  const block=currentMemo.blocks.find(x=>x.id===bid);
  if(!block)return;
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      block.photos.push(ev.target.result);
      block.transforms.push({rotate:0,scale:1,x:0,y:0});
      loaded++;if(loaded===files.length)renderMemoBody();
    };
    reader.readAsDataURL(file);
  });
  this.value='';
});

function openViewer(blockId,photoIdx,src,transform){
  viewerBlockId=blockId;viewerPhotoIdx=photoIdx;
  viewerScale=transform.scale||1;
  viewerRotate=transform.rotate||0;
  viewerTransX=transform.x||0;
  viewerTransY=transform.y||0;
  document.getElementById('viewerImg').src=src;
  applyViewerTransform();
  document.getElementById('photoViewer').classList.add('show');
}

function closeViewer(){document.getElementById('photoViewer').classList.remove('show');}

function saveViewer(){
  if(viewerBlockId===null)return;
  collectMemoBlocks();
  const block=currentMemo.blocks.find(x=>x.id===viewerBlockId);
  if(block){
    if(!block.transforms)block.transforms=[];
    block.transforms[viewerPhotoIdx]={rotate:viewerRotate,scale:viewerScale,x:viewerTransX,y:viewerTransY};
  }
  closeViewer();
  renderMemoBody();
}

function applyViewerTransform(){
  document.getElementById('viewerImg').style.transform=`translate(${viewerTransX}px,${viewerTransY}px) rotate(${viewerRotate}deg) scale(${viewerScale})`;
}

const vWrap=document.getElementById('viewerImgWrap');
vWrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchStartScale=viewerScale;
    pinchStartAngle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY,e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI;
    pinchStartRotate=viewerRotate;
  }else{
    isDragging=true;
    dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
    dragStartTX=viewerTransX;dragStartTY=viewerTransY;
  }
},{passive:true});

vWrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    viewerScale=Math.min(5,Math.max(0.3,pinchStartScale*(dist/pinchStartDist)));
    const angle=Math.atan2(e.touches[1].clientY-e.touches[0].clientY,e.touches[1].clientX-e.touches[0].clientX)*180/Math.PI;
    viewerRotate=pinchStartRotate+(angle-pinchStartAngle);
    applyViewerTransform();
  }else if(isDragging&&e.touches.length===1){
    viewerTransX=dragStartTX+(e.touches[0].clientX-dragStartX);
    viewerTransY=dragStartTY+(e.touches[0].clientY-dragStartY);
    applyViewerTransform();
  }
  e.preventDefault();
},{passive:false});

vWrap.addEventListener('touchend',e=>{if(e.touches.length===0)isDragging=false;});

function showModal(title,placeholder,callback){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalInput').value='';
  document.getElementById('modalInput').placeholder=placeholder;
  modalCallback=callback;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('modalInput').focus(),100);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalConfirmBtn').addEventListener('click',()=>{
  const val=document.getElementById('modalInput').value.trim();
  if(val&&modalCallback)modalCallback(val);
  closeModal();
});
document.getElementById('modalInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('modalConfirmBtn').click();});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showAddGroupModal(){
  showModal('대그룹 추가','대그룹 이름',name=>{data.groups.push({id:uid(),name,open:false,subs:[]});saveData();render();});
}
function showAddSubModal(gid){
  showModal('소그룹 추가','소그룹 이름',name=>{
    const g=data.groups.find(x=>x.id===gid);
    if(g){g.subs.push({id:uid(),name,blocks:[]});g.open=true;saveData();render();}
  });
}

function showCtx(e,type,id,parentId){
  e.preventDefault();ctxType=type;ctxTarget={id,parentId};
  const menu=document.getElementById('ctxMenu');
  document.getElementById('ctxAddSub').style.display=type==='group'?'block':'none';
  menu.style.left=Math.min(e.clientX,window.innerWidth-170)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-130)+'px';
  menu.classList.add('show');
}
document.addEventListener('click',()=>document.getElementById('ctxMenu').classList.remove('show'));

document.getElementById('ctxRename').addEventListener('click',()=>{
  showModal(ctxType==='group'?'대그룹 이름 변경':'소그룹 이름 변경','새 이름',name=>{
    if(ctxType==='group'){const g=data.groups.find(x=>x.id===ctxTarget.id);if(g){g.name=name;saveData();render();}}
    else{const g=data.groups.find(x=>x.id===ctxTarget.parentId);const s=g&&g.subs.find(x=>x.id===ctxTarget.id);if(s){s.name=name;saveData();render();}}
  });
});
document.getElementById('ctxAddSub').addEventListener('click',()=>showAddSubModal(ctxTarget.id));
document.getElementById('ctxDelete').addEventListener('click',()=>{
  if(ctxType==='group')data.groups=data.groups.filter(x=>x.id!==ctxTarget.id);
  else{const g=data.groups.find(x=>x.id===ctxTarget.parentId);if(g)g.subs=g.subs.filter(x=>x.id!==ctxTarget.id);}
  saveData();render();
});

render();
</script>
</body>
</html>
