<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 메모장</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.png" type="image/png" />
<link rel="apple-touch-icon" href="icon.png" />
<style>
:root{--bg:#f5f5f7;--card:#fff;--border:#e5e5ea;--primary:#007aff;--text:#1c1c1e;--muted:#8e8e93;--red:#ff3b30;--green:#34c759;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:18px;font-weight:700;}
.icon-btn{border:none;background:none;font-size:22px;color:var(--primary);padding:4px;cursor:pointer;}
.main-view{padding:12px;}
.group-item{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.group-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.group-name{font-size:16px;font-weight:700;}
.group-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.group-arrow.open{transform:rotate(90deg);}
.group-children{display:none;border-top:1px solid var(--border);}
.group-children.open{display:block;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 12px 28px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.sub-item:last-child{border-bottom:none;}
.sub-name{font-size:15px;}
.sub-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.sub-arrow{font-size:16px;color:var(--muted);}
.memo-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column;}
.memo-view.show{display:flex;}
.memo-header{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.back-btn{border:none;background:none;font-size:36px;color:var(--primary);padding:0 8px 0 0;cursor:pointer;line-height:1;}
.save-btn{border:none;background:var(--primary);color:#fff;border-radius:8px;padding:7px 16px;font-size:15px;font-weight:700;cursor:pointer;}
.memo-body{flex:1;overflow-y:auto;padding:12px;padding-top:16px;-webkit-overflow-scrolling:touch;position:relative;}
.toolbar{background:#fff;border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.tool-btn{border:none;background:var(--bg);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.block{margin-bottom:8px;position:relative;}
.checklist-block{background:var(--card);border-radius:10px;padding:8px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.check-item:last-child{border-bottom:none;}
.check-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--primary);flex-shrink:0;}
.check-item-text{flex:1;border:none;background:none;font-size:15px;color:var(--text);outline:none;font-family:inherit;}
.check-item-text.done{text-decoration:line-through;color:var(--muted);}
.add-check-btn{display:flex;align-items:center;gap:6px;color:var(--primary);font-size:14px;border:none;background:none;padding:8px 0;cursor:pointer;width:100%;}
.block-del{display:none;position:absolute;top:6px;right:6px;background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.block-handle{display:none;position:absolute;top:8px;left:8px;background:rgba(0,0,0,.2);color:#fff;border:none;border-radius:6px;width:22px;height:22px;font-size:11px;align-items:center;justify-content:center;cursor:grab;z-index:10;touch-action:none;}
.photo-block{border-radius:10px;padding:4px;}
.photo-item{position:relative;margin-bottom:6px;border-radius:8px;}
.photo-item img{width:100%;display:block;border-radius:8px;transform-origin:center center;}
.photo-done-btn{display:none;position:absolute;bottom:8px;left:8px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;z-index:5;}
.photo-item.editing .photo-done-btn{display:block;}
.photo-del{display:none;position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.photo-item.editing .photo-del{display:flex;}
.free-text{position:absolute;min-width:80px;max-width:70%;z-index:50;touch-action:none;}
.free-text-bubble{background:rgba(255,255,255,.92);border-radius:14px;padding:8px 12px;font-size:14px;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.15);min-height:36px;word-break:break-word;white-space:pre-wrap;cursor:move;user-select:none;border:2px solid transparent;}
.free-text.transparent .free-text-bubble{background:transparent;box-shadow:none;text-shadow:0 1px 3px rgba(255,255,255,.8);}
.free-text.selected.transparent .free-text-bubble{border:2px dashed var(--primary);}
.free-text.selected .free-text-bubble{border-color:var(--primary);}
.free-text-edit{display:none;position:absolute;top:0;left:0;right:0;min-height:36px;border:2px solid var(--primary);background:rgba(255,255,255,.97);border-radius:14px;padding:8px 12px;font-size:14px;color:var(--text);outline:none;resize:none;font-family:inherit;z-index:51;}
.free-text.editing .free-text-edit{display:block;}
.free-text.editing .free-text-bubble{visibility:hidden;}
.free-text-done{display:none;position:absolute;top:-28px;right:0;background:var(--green);color:#fff;border:none;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;z-index:52;}
.free-text-del{display:none;position:absolute;top:-28px;right:52px;background:var(--red);color:#fff;border:none;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;z-index:52;}
.free-text.selected .free-text-done{display:block;}
.free-text.selected .free-text-del{display:block;}
.split-block{display:flex;gap:8px;border-radius:10px;padding:8px;margin-bottom:8px;}
.split-photo{flex:1;border-radius:8px;overflow:hidden;}
.split-photo img{width:100%;display:block;border-radius:8px;}
.split-text{flex:1;border:none;background:var(--bg);border-radius:8px;padding:8px;font-size:14px;color:var(--text);outline:none;resize:none;font-family:inherit;min-height:100px;}
.video-block{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:8px;}
.video-frame{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;}
.video-url-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px;}
.video-add-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:400;align-items:flex-end;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px;width:100%;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:12px;}
.modal-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;outline:none;font-family:inherit;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;}
.modal-btn.confirm{background:var(--primary);color:#fff;}
.modal-btn.cancel{background:var(--bg);color:var(--text);}
.ctx-menu{display:none;position:fixed;background:var(--card);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);overflow:hidden;z-index:500;min-width:160px;}
.ctx-menu.show{display:block;}
.ctx-item{padding:12px 16px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--border);}
.ctx-item:last-child{border-bottom:none;}
.ctx-item.danger{color:var(--red);}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">용용이 메모장</div>
  <button class="icon-btn" onclick="showAddGroupModal()">➕</button>
</div>
<div class="main-view"><div id="groupList"></div></div>
<div class="memo-view" id="memoView">
  <div class="memo-header">
    <button class="back-btn" onclick="closeMemo()">‹</button>
    <button class="save-btn" id="saveBtn" onclick="saveMemo()">저장</button>
  </div>
  <div class="memo-body" id="memoBody"></div>
  <div class="toolbar">
    <button class="tool-btn" onclick="addFreeText('white')">💬 말풍선</button>
    <button class="tool-btn" onclick="addFreeText('transparent')">🔤 투명말풍선</button>
    <button class="tool-btn" onclick="addChecklistBlock()">☑️ 체크</button>
    <button class="tool-btn" onclick="addPhotoBlock()">🖼 사진</button>
    <button class="tool-btn" onclick="addVideoBlock()">🎬 동영상</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <input class="modal-input" id="modalInput" placeholder="이름 입력" />
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" id="modalConfirmBtn">확인</button>
    </div>
  </div>
</div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxRename">이름 변경</div>
  <div class="ctx-item" id="ctxAddSub">소그룹 추가</div>
  <div class="ctx-item danger" id="ctxDelete">삭제</div>
</div>
<input type="file" id="photoInput" accept="image/*" multiple style="display:none" />
